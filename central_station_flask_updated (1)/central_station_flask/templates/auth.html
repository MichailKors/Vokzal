{% extends 'base.html' %}
{% block content %}
<div class="auth-card">
    <h1>Личный кабинет</h1>
    <div class="tabs small-tabs">
        <a class="{{ 'active-tab' if tab != 'register' else '' }}" href="{{ url_for('auth', tab='login') }}">Вход</a>
        <a class="{{ 'active-tab' if tab == 'register' else '' }}" href="{{ url_for('auth', tab='register') }}">Регистрация</a>
    </div>
    <form method="post" class="form-stack">
        <input type="hidden" name="action" value="{{ 'register' if tab == 'register' else 'login' }}">
        <label>Email<input name="email" type="email" placeholder="Email" required></label>
        <label>{% if tab == 'register' %}Придумайте пароль{% else %}Пароль{% endif %}<input name="password" type="password" placeholder="{% if tab == 'register' %}Придумайте пароль{% else %}Пароль{% endif %}" required></label>
        <button class="primary" type="submit">{% if tab == 'register' %}Зарегистрироваться{% else %}Войти{% endif %}</button>
    </form>
</div>
{% endblock %}
