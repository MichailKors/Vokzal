<div class="ticket-card item-card blue-border">
    <div class="ticket-main">
        <b>› {{ ticket.where_from }}</b><span>› {{ ticket.to }}</span>
        <small>▧ {{ ticket.date_of_trip }} в {{ ticket.time }} <em>{{ ticket.train }}</em></small>
    </div>
    <b class="price">{{ ticket.price }}₽</b>
</div>
